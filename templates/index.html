<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <nav id="main-nav" class="navbar"></nav>

    <div id="hero-section" class="hero">
        <div class="hero-content">
            <h1 id="hero-slogan-text" class="hero-slogan-main"></h1>
            <div id="search-bar" class="search-container"></div>
        </div>
    </div>

    <div id="main-content-wrapper">
        <!-- Rent Section -->
        <h2 id="rent-title" class="section-main-title"></h2>
        <div id="rent-section-wrapper" class="main-content-section">
            <div id="slogan-container-rent" class="slogan-side"></div>
            <div class="filter-side">
                <div id="filter-options-rent" class="filter-tags"></div>
                <div id="property-list-rent" class="property-grid"></div>
                <div id="pagination-rent" class="pagination"></div>
            </div>
        </div>

        <!-- Buy Section -->
        <h2 id="buy-title" class="section-main-title"></h2>
        <div id="buy-section-wrapper" class="main-content-section">
            <div id="slogan-container-buy" class="slogan-side"></div>
            <div class="filter-side">
                <div id="filter-options-buy" class="filter-tags"></div>
                <div id="property-list-buy" class="property-grid"></div>
                <div id="pagination-buy" class="pagination"></div>
            </div>
        </div>
    </div>

    <div id="property-detail-view" class="detail-view-container" style="display: none;"></div>

    <div class="container">
    </div>

    <footer id="main-footer" class="footer"></footer>

    <div id="modal-container" class="modal-overlay"></div>

    <div id="lightbox-modal" class="lightbox-overlay" style="display: none;">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button class="lightbox-nav prev" onclick="changeLightboxImage(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="">
            <div id="lightbox-caption"></div>
        </div>
        <button class="lightbox-nav next" onclick="changeLightboxImage(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Leaflet JS for Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="{{ url_for('static', filename='js/content.js') }}"></script>
</body>
</html>
